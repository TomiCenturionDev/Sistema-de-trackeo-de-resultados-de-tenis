spring.application.name=tenis.stats
logging.level.org.springframework.context.support=ERROR

# Datos de base de datos (se cargan desde el perfil local)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

server.port=8080


# Datos de Salesforce:
salesforce.client.id=${SF_CLIENT_ID}
salesforce.client.secret=${SF_CLIENT_S}
salesforce.username=${SF_USER}
salesforce.password=${SF_PASS}
salesforce.login.url=${SF_LOGIN_URL}
salesforce.instance.url=${SF_INSTANCE_URL}
salesforce.lead.endpoint=${SF_LEAD_ENDPOINT}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=always
